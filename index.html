<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jeovander C. Souza — Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 20px;
      border: 3px solid rgba(168,85,247,0.5);
    }=

    .name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .role {
      font-size: 1rem;
      font-weight: 400;
      color: #a855f7;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .brand {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: #fff;
    }

    .btn-instagram {
      background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af);
      color: #fff;
    }

    .btn-email {
      background: rgba(255,255,255,0.08);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-email:hover {
      background: rgba(255,255,255,0.15);
    }

    .btn-projeto {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
    }

    .icon { font-size: 1.2rem; }

    .verse {
      margin-top: 36px;
      padding: 16px;
      background: rgba(255,255,255,0.04);
      border-left: 3px solid #a855f7;
      border-radius: 8px;
      text-align: left;
    }

    .verse p {
      font-size: 0.82rem;
      color: #94a3b8;
      font-style: italic;
      line-height: 1.6;
    }

    .verse span {
      display: block;
      margin-top: 6px;
      font-size: 0.78rem;
      color: #a855f7;
      font-style: normal;
      font-weight: 600;
    }

    .footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar">✝️</div>

    <h1 class="name">Jeovander C. Souza</h1>
    <p class="role">Designer</p>
    <p class="brand">📺 LUZ BÍBLICA TV</p>

    <div class="divider"></div>

    <div class="links">

      <a class="btn btn-whatsapp"
         href="https://wa.me/5519999985908"
         target="_blank" rel="noopener">
        <span class="icon">💬</span> WhatsApp
      </a>

      <a class="btn btn-instagram"
         href="https://instagram.com/luzemreels"
         target="_blank" rel="noopener">
        <span class="icon">📸</span> Instagram — @luzemreels
      </a>

      <a class="btn btn-email"
         href="mailto:forcabiblica72@gmail.com">
        <span class="icon">✉️</span> forcabiblica72@gmail.com
      </a>

      <a class="btn btn-projeto"
         href="https://jeovander.github.io/biblia-explicada/"
         target="_blank" rel="noopener">
        <span class="icon">📖</span> Bíblia Explicada
      </a>

    </div>

    <div class="verse">
      <p>"Seja a luz de vocês assim brilhar diante dos homens, para que vejam as suas boas obras."</p>
      <span>— Mateus 5:16 (NAA)</span>
    </div>

    <p class="footer">© 2026 Jeovander C. Souza</p>
  </div>
</body>
</html>
