<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jeovander C. Souza — Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .role {
      color: #e94560;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .bio {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.2s, opacity 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-primary {
      background: #e94560;
      color: #fff;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
    }

    .versículo {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      font-style: italic;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">
  <img src="Ativos/jeovander.jpg" alt="Jeovander C. Souza" style="width:100px;height:100px;border-radius:50%;object-fit:cover;">
</div>

    <h1>Jeovander C. Souza</h1>
    <p class="role">Designer Gráfico & Visual</p>
    <p class="bio">Criando identidades visuais com propósito.<br/>Piracicaba — SP 🇧🇷</p>

    <div class="links">
      <a class="btn btn-primary" href="mailto:seuemail@gmail.com">📧 Fale comigo</a>
      <a class="btn btn-outline" href="https://instagram.com/seuinstagram" target="_blank">📸 Instagram</a>
      <a class="btn btn-outline" href="https://wa.me/5519900000000" target="_blank">💬 WhatsApp</a>
    </div>

    <div class="versículo">
      "Tudo o que fizerem, façam de todo o coração, como para o Senhor."<br/>
      — Colossenses 3:23 (NVI)<br/><br/>
      <span style="font-style:normal;">Seu trabalho tem propósito. Faça com excelência! 🙏</span>
    </div>
  </div>
</body>
</html>
